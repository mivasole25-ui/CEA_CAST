<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso Corporativo - CEA Castellanos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">C</div>
            CEA <span>Castellanos</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Ingreso Corporativo</h2>
            <p>Acceso exclusivo para personal de la academia (Administradores e Instructores).</p>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" class="form-input" placeholder="ejemplo@cea.com" required>
                <small id="error-correo" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                <small id="error-password" class="error-text"></small>
            </div>

            <button onclick="login()" class="btn-primary" id="btn-login">Ingresar al Sistema</button>

            <div id="mensaje"></div>

            <a href="register.html" class="auth-link">¿No tienes cuenta? Registra personal aquí.</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
