<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personal - CEA Castellanos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">C</div>
            CEA <span>Castellanos</span>
        </div>
        <nav>
            <ul>
                <li><a href="login.html">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Registrar Personal</h2>
            <p>Formulario para registrar nuevos Administradores o Instructores de la academia.</p>

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" class="form-input" placeholder="Nombre completo" required>
                <small id="error-nombre" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" class="form-input" placeholder="correo@cea.com" required>
                <small id="error-correo" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                <small id="error-password" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="role">Rol Corporativo</label>
                <select id="role" class="form-input" style="background-color: #121829;" required>
                    <option value="" disabled selected>Selecciona un rol</option>
                    <option value="administrador">Administrador</option>
                    <option value="instructor">Instructor</option>
                </select>
                <small id="error-role" class="error-text"></small>
            </div>

            <button onclick="register()" class="btn-primary" id="btn-registrar">Registrar Usuario</button>

            <div id="mensaje"></div>

            <a href="login.html" class="auth-link">Volver al <strong>Inicio de Sesión</strong></a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
